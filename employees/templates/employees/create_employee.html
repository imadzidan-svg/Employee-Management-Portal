{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">

    Create Employee

</h2>

<form
    method="POST"
    enctype="multipart/form-data"
>

    {% csrf_token %}

    {{ form.as_p }}

    <button
        type="submit"
        class="btn btn-success"
    >

        Save Employee

    </button>

</form>

{% endblock %}
