{% extends 'base.html' %}

{% block content %}

<h2>

    Delete Employee

</h2>

<p>

    Are you sure you want to delete:

    <strong>

        {{ employee.first_name }}
        {{ employee.last_name }}

    </strong>

    ?

</p>

<form method="POST">

    {% csrf_token %}

    <button
        type="submit"
        class="btn btn-danger"
    >

        Confirm Delete

    </button>

</form>

{% endblock %}
